# github workflow to automate builds
name: index.json updater

# Controls when the action will run.
on:
  # every hour
  schedule:
  - cron: '0 0-23 * * *'

  # manual
  workflow_dispatch:

jobs:
  build:
    name: Update
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    # overwrite current file if newer and commit
    - name: Main
      run: |
        wget -q --timestamp ${{ secrets.INFO_JSON_URL }}

        git config --global user.email "${{ secrets.USER_MAIL }}"
        git config --global user.name "${{ secrets.USER_NAME }}"
        git add index.json
        git commit -m "updated list"
        git push
