# github workflow to automate builds
name: index.json updater

# Controls when the action will run.
on:
  # every hour
  schedule:
  - cron: '0 0-23 * * *'

  # manual
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    # ignore error when no changes
    continue-on-error: true
    steps:
    # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
    # has default config, commit token, etc  (https://github.com/actions/checkout#usage)
    - uses: actions/checkout@v2
      with:
        fetch-depth: 0
        # get actual 
        ref: ${{ github.event.pull_request.head.sha }}
    #    token: ${{ secrets.GITHUB_TOKEN }}
    # overwrite current file if newer and commit
    - name: Main
      env:
        INFO_JSON_URL: ${{ secrets.INFO_JSON_URL }}
        USER_MAIL: ${{ secrets.USER_MAIL }}
        USER_NAME: ${{ secrets.USER_NAME }}
        INDEX_JSON: index.json
      # restore git's last mod date for index.json, otherwise --timestamp won't work
        # TODO: not working, git log returns current (clone?) date
        #touch -d $(git log --pretty=format:%cI -1 "$INDEX_JSON") "$INDEX_JSON"
        #wget -q --timestamp $INDEX_JSON $INFO_JSON_URL
      run: |
        echo git log "$INDEX_JSON" $(git log "$INDEX_JSON")
        echo git log --skip 1  $(git log --skip 1 )
        echo git log --skip 1 "$INDEX_JSON" $(git log --skip 1 "$INDEX_JSON")
        echo git log --skip 1 --pretty=format:%cI "$INDEX_JSON") $(git log --skip 1 --pretty=format:%cI "$INDEX_JSON")
        touch -d $(git log --skip 1 --pretty=format:%cI -1 "$INDEX_JSON") "$INDEX_JSON"
        echo $(stat "$INDEX_JSON")


        wget -q -O $INDEX_JSON $INFO_JSON_URL
        git config --global user.email "$USER_MAIL"
        git config --global user.name "$USER_NAME"
        git add "$INDEX_JSON"
        git commit -m "updated list"
        git push
