<!DOCTYPE html>
<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>joshw frontend</title>
    <!--<link rel="search" type="application/opensearchdescription+xml" title="vgm.hcs64.com" href="opensearch.xml">-->
    <link href="frontend.css" rel="stylesheet" type="text/css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>

    <header class="header">
        <h1 class="head">xxx.joshw.info Updates, Search and Stuff <span id="banana">&#x1F34C;</span></h1>

        <nav class="links">
            <a href="?">Updates</a> ·
            <!--<a href="#tags" class="add" data-tag="*">Tags</a> ·-->
            <a href="https://vgm.hcs64.com/upload/" target="_blank">Contribute</a> ·
            <a href="https://hcs64.com/" target="_blank">HCS</a> ·
            <a href="https://hcs64.com/mboard/forum.php" target="_blank">Forum</a>
        </nav>
    </header>

    <form id="searchform" action=".">
        <input name="text" placeholder="Go ahead, search away!" type="search" tabindex="1" autocomplete="off">
        <input type="hidden" name="site"/>
        <input type="hidden" name="page"/>
        <!--
        <input type="hidden" name="set"/>
        <input type="hidden" name="tags"/>
        -->
        <input type="submit" value="Go">

        <small><i>term</i> partial matches, <b>"</b><i>term term</i><b>"</b> exact phrase, <b>^</b><i>term</i> start of title, <b>-</b><i>term</i> exclude matches</small>
    </form>

    <section id="main">
        <div id="content">
        </div>
    </section>

    <div class="tpl">
        <div id="tpl-results-recent" class="results">
            <a href="">#</a>
            <b>Recently added &amp; updated</b>
        </div>

        <div id="tpl-results-search" class="results">
            <a href="">#</a>
            <span class="text"></span> results
        </div>

        <div id="tpl-systems" class="systems">
            System:
        </div>
        <span id="tpl-system" class="sitetag tag" data-site=""></span>

        <div id="tpl-date" class="date">
            <span class="text"></span>
            <hr>
        </div>

        <div id="tpl-urls" class="urls">
        </div>

        <div id="tpl-url">
            <a href=""></a>
            <span class="sitetag tag" data-site=""></span>
            <small class="info"></small>
            <span class="showset tag" data-set="" title="show details" style="display:none;">···</span>
        </div>

        <div id="tpl-pagination" class="pagination">
        </div>

        <a id="tpl-page-number" data-page=""></a>
        <a id="tpl-page-prev" class="page-prev" data-page="">prev</a>
        <a id="tpl-page-next" class="page-next" data-page="">next</a>
        <span id="tpl-page-more">...</span>
    </div>

    <script src="frontend.js"></script>
</body>
</html>
